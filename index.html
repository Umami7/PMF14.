<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battery Pack Optimizer</title>
</head>
<body>

<header>
  <h1>⬡ BATTERY PACK OPTIMIZER</h1>
  <span>3D Zellverteilung · EU Battery Regulation 2023/1542</span>
</header>

<div class="main">

  <!-- ── LEFT PANEL ─────────────────────────────────────── -->
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- SHAPE -->
      <div class="card">
        <div class="card-title">① Bauraum-Form</div>
        <label>Grundform</label>
        <select id="shapeType">
          <option value="rectangle">Rechteck</option>
          <option value="l_shape">L-Form</option>
          <option value="u_shape">U-Form</option>
          <option value="t_shape">T-Form</option>
          <option value="triangle">Dreieck (rechtwinklig)</option>
          <option value="trapeze">Trapez</option>
        </select>

        <div id="shapeDims">
          <div class="row2">
            <div><label>L (X) mm</label><input type="number" id="dim_l" value="400" min="10" /></div>
            <div><label>W (Y) mm</label><input type="number" id="dim_w" value="300" min="10" /></div>
          </div>
          <div><label>H (Z) mm</label><input type="number" id="dim_h" value="200" min="10" /></div>
        </div>

        <div id="extra_cut" style="display:none">
          <div class="row2">
            <div><label>cut_l mm</label><input type="number" id="dim_cut_l" value="150" min="1" /></div>
            <div><label>cut_w mm</label><input type="number" id="dim_cut_w" value="120" min="1" /></div>
          </div>
        </div>
        <div id="extra_t" style="display:none">
          <div class="row2">
            <div><label>stem_w mm</label><input type="number" id="dim_stem_w" value="80" min="1" /></div>
            <div><label>bar_h mm</label><input type="number" id="dim_bar_h" value="60" min="1" /></div>
          </div>
        </div>
        <div id="extra_trap" style="display:none">
          <div><label>top_mm (oben) mm</label><input type="number" id="dim_top_mm" value="200" min="1" /></div>
        </div>
      </div>

      <!-- CELL -->
      <div class="card">
        <div class="card-title">② Zelltyp</div>
        <div class="cell-preset">
          <button class="preset-btn" data-preset="18650">18650</button>
          <button class="preset-btn" data-preset="21700">21700</button>
          <button class="preset-btn" data-preset="BYD50">BYD 50Ah</button>
          <button class="preset-btn" data-preset="EVE50">EVE 50Ah</button>
          <button class="preset-btn" data-preset="custom">Benutzerdefiniert</button>
        </div>
        <label>Typ</label>
        <select id="cellType">
          <option value="round">Rundzelle (zylindrisch)</option>
          <option value="prismatic">Prismatisch</option>
        </select>

        <div id="round_dims">
          <div class="row2">
            <div><label>Ø Durchmesser mm</label><input type="number" id="cell_diam" value="18" min="1" step="0.1" /></div>
            <div><label>Höhe mm</label><input type="number" id="cell_h_round" value="65" min="1" step="0.1" /></div>
          </div>
        </div>
        <div id="prism_dims" style="display:none">
          <div class="row2">
            <div><label>Breite mm</label><input type="number" id="cell_w" value="148" min="1" step="0.1" /></div>
            <div><label>Tiefe mm</label><input type="number" id="cell_d" value="27" min="1" step="0.1" /></div>
          </div>
          <div><label>Höhe mm</label><input type="number" id="cell_h_prism" value="91" min="1" step="0.1" /></div>
        </div>

        <div id="grid_opts_round" style="margin-top:8px">
          <label>Rastertyp</label>
          <select id="gridType">
            <option value="grid">Rechteckig (Grid)</option>
            <option value="honeycomb">Honeycomb (versetzt)</option>
          </select>
        </div>
      </div>

      <!-- ABSTÄNDE -->
      <div class="card">
        <div class="card-title">③ Abstände</div>
        <div class="row2">
          <div>
            <label>Rand mm</label>
            <input type="number" id="paramMargin" value="5" min="0" step="0.5" />
          </div>
          <div>
            <label>Ebenen-Gap mm</label>
            <input type="number" id="paramLayerGap" value="2" min="0" step="0.5" />
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Zell-Gap Rund mm</label>
            <input type="number" id="paramGapRound" value="5" min="0" step="0.5" />
          </div>
          <div>
            <label>Zell-Gap Prism mm</label>
            <input type="number" id="paramGapPrism" value="1" min="0" step="0.5" />
          </div>
        </div>
      </div>

      <button id="runBtn">▶ OPTIMIERUNG STARTEN</button>

      <!-- GRID OFFSET -->
      <div class="card" id="offsetCard" style="display:none">
        <div class="card-title">④ Grid-Versatz</div>
        <label>Versatz X <span class="offset-val" id="gridOffXVal">0</span> mm</label>
        <input type="range" id="gridOffX" min="0" max="50" step="0.5" value="0" />
        <label>Versatz Y <span class="offset-val" id="gridOffYVal">0</span> mm</label>
        <input type="range" id="gridOffY" min="0" max="50" step="0.5" value="0" />
        <label>Versatz Z <span class="offset-val" id="gridOffZVal">0</span> mm</label>
        <input type="range" id="gridOffZ" min="0" max="50" step="0.5" value="0" />
      </div>

      <!-- WRAP -->
      <div class="card" id="wrapCard" style="display:none">
        <div class="card-title">⑤ Schrumpffolie</div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:10px">
          <input type="checkbox" id="wrapToggle" />
          Schrumpffolie anzeigen
        </label>
        <label>Folienstärke mm</label>
        <input type="number" id="wrapThickness" value="2" min="0.5" max="20" step="0.5" />
        <label>Farbe</label>
        <input type="color" id="wrapColor" value="#44aaff" style="width:100%;height:32px;border:none;border-radius:4px;cursor:pointer;margin-top:2px" />
        <label>Deckkraft <span id="wrapOpacityVal">0.35</span></label>
        <input type="range" id="wrapOpacity" min="0.05" max="0.95" step="0.05" value="0.35" />
      </div>

    </div><!-- /sidebar-inner -->

    <!-- RESULTS -->
    <div class="results" id="resultsPanel" style="display:none">
      <div class="results-title">Ergebnisse</div>
      <div class="result-best" id="bestCount">—</div>
      <div class="result-sub" id="bestDesc">—</div>
      <div class="result-list" id="resultList"></div>
    </div>
  </div><!-- /sidebar -->

  <!-- ── 3D VIEWER ───────────────────────────────────────── -->
  <div class="viewer">
    <canvas id="c"></canvas>

    <div class="overlay" id="overlay" style="display:none">
      <div class="ov-row"><span class="ov-label">Zellen gesamt</span><span class="ov-val" id="ov_total">—</span></div>
      <div class="ov-row"><span class="ov-label">Im Raster</span><span class="ov-val" id="ov_grid">—</span></div>
      <div class="ov-row"><span class="ov-label">Ebenen</span><span class="ov-val" id="ov_layers">—</span></div>
      <div class="ov-row"><span class="ov-label">Anordnung</span><span class="ov-val" id="ov_orient">—</span></div>
    </div>

    <div class="vis-controls" id="visControls" style="display:none">
      <button class="vis-btn active" id="btnSolid">Solid</button>
      <button class="vis-btn" id="btnWire">Wireframe</button>
      <button class="vis-btn" id="btnSkeleton">Skelett</button>
    </div>

    <div class="controls-hint">Drehen: LMB · Zoom: Scroll · Pan: RMB/2-Finger</div>

    <div class="progress" id="progress" style="display:none">
      <div class="progress-text" id="prog_text">Berechnung läuft…</div>
      <div class="progress-sub" id="prog_sub">Prüfe alle Kombinationen…</div>
    </div>
  </div><!-- /viewer -->

</div><!-- /main -->

<script type="module" src="/src/main.ts"></script>
</body>
</html>
